<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; touch-action: none; }
        #map { height: 100vh; width: 100vw; }
        #counter {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 8px 12px;
            border-radius: 5px; font-family: sans-serif; font-size: 14px; border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div id="counter">Buses: Loading...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // preferCanvas: true is essential for mobile performance
        const map = L.map('map', { 
            zoomControl: false,
            preferCanvas: true 
        }).setView([41.1579, -8.6291], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // This is our active container
        let busLayer = L.layerGroup().addTo(map);

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            // FIX: Don't update while the user is zooming/moving or it will glitch
            if (map._animatingZoom || map.dragging.moving()) return;

            try {
                // Fetch with cache-busting
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now());
                const data = await response.json();
                
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                
                // Create a NEW temporary layer
                const nextLayer = L.layerGroup();

                data.forEach(bus => {
                    const idParts = bus.id.split(':');
                    const fleetId = idParts[idParts.length - 1];
                    let line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        
                        const marker = L.circleMarker([lat, lon], {
                            radius: 8, 
                            fillColor: getBusColor(line),
                            color: "#ffffff", 
                            weight: 1.5,
                            opacity: 1,
                            fillOpacity: 1
                        });

                        marker.bindPopup(`<b>${line} | ${fleetId}</b>`);
                        nextLayer.addLayer(marker);
                    }
                });

                // FIX: Swap layers instantly. NO MORE CLEARLAYERS FLICKER.
                const oldLayer = busLayer;
                busLayer = nextLayer.addTo(map);
                map.removeLayer(oldLayer);

            } catch (e) { console.error("Update failed:", e); }
        }

        updateBuses();
        
        // FIX: Change to 3000ms (3 seconds). 
        // 500ms is faster than the API actually updates and causes lag.
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
