<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; touch-action: none; }
        #map { height: 100vh; width: 100vw; }
        
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: white; padding: 12px;
            border-radius: 8px; font-family: monospace; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }
        #counter { font-weight: bold; font-size: 18px; color: #00ff00; display: block; }
        #timestamp { font-size: 10px; color: #ffae00; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="dashboard">
        <span id="counter">BUSES: --</span>
        <span id="timestamp">SYNCING DATA...</span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-marker-slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>

    <script>
        // Use preferCanvas: true for better mobile performance
        const map = L.map('map', { 
            zoomControl: false, 
            preferCanvas: true 
        }).setView([41.1579, -8.6291], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // This object tracks markers so we can move them instead of deleting them
        let busMarkers = {};

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            // FIX: Don't update dots while the user is zooming/moving or it bugs out
            if (map._animatingZoom || map.dragging.moving()) return;

            try {
                // FORCE: 'no-store' prevents the "Must press F5" bug on mobile
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now(), {
                    cache: "no-store",
                    headers: { 'Cache-Control': 'no-cache' }
                });
                const data = await response.json();
                
                document.getElementById('counter').innerText = `BUSES: ${data.length}`;
                
                const now = new Date();
                document.getElementById('timestamp').innerText = `LAST SYNC: ${now.toLocaleTimeString('pt-PT')}`;

                const activeIds = new Set();

                data.forEach(bus => {
                    const id = bus.id;
                    const fleetId = id.split(':').pop();
                    let line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        activeIds.add(id);

                        if (busMarkers[id]) {
                            // If bus exists, slide it to new position over 1.5 seconds
                            busMarkers[id].slideTo([lat, lon], { duration: 1500 });
                        } else {
                            // If new bus, create circle marker
                            const marker = L.circleMarker([lat, lon], {
                                radius: 8, 
                                fillColor: getBusColor(line),
                                color: "#ffffff", 
                                weight: 1.5,
                                opacity: 1,
                                fillOpacity: 1
                            }).addTo(map);

                            marker.bindPopup(`<b>${line} | ${fleetId}</b>`);
                            busMarkers[id] = marker;
                        }
                    }
                });

                // Remove buses that are no longer on the road
                for (const id in busMarkers) {
                    if (!activeIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                    }
                }

            } catch (e) { 
                console.error("Update failed:", e);
                document.getElementById('timestamp').innerText = "CONNECTION LOST...";
            }
        }

        // Initial run
        updateBuses();
        
        // 2000ms (2 seconds) is the fastest reliable speed for this API
        setInterval(updateBuses, 2000); 
    </script>
</body>
</html>
