<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }
        .bus-wrapper {
            position: relative; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .bus-dot {
            width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 2;
        }
        .bus-direction {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; transition: transform 0.5s ease-in-out;
            z-index: 1; pointer-events: none;
        }
        @media (max-width: 768px) { .bus-wrapper { transform: scale(0.7); } }
        .leaflet-marker-icon { transition: none !important; background: none !important; border: none !important; }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Connecting...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Waiting for data...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const lineDestinations = {
            "200": ["Bolhão", "Castelo do Queijo"], "201": ["Aliados", "Viso"], "202": ["Aliados", "Passeio Alegre"], "203": ["Estádio do Dragão", "Casa da Música"], "204": ["Hospital de São João", "Foz"], "205": ["Campanhã", "Castelo do Queijo"], "206": ["Campanhã", "Viso"], "207": ["Campanhã", "Mercado da Foz"], "208": ["Aliados", "Aldoar"], "209": ["Pasteleira", "Prelada"],
            "300": ["Circular (Via Hospital de São João)", "Circular (Via Hospital de São João)"], "301": ["Circular (Via Sá da Bandeira)", "Circular (Via Sá da Bandeira)"], "302": ["Circular (Via Aliados)", "Circular (Via Aliados)"], "303": ["Circular (Via Praça da Liberdade)", "Circular (Via Praça da Liberdade)"], "304": ["Aliados", "Santa Luzia"], "305": ["Cordoaria", "Hospital de São João"],
            "400": ["Aliados", "Parque Nascente"], "401": ["Bolhão", "São Roque"], "402": ["Boavista", "São Roque"], "403": ["Boavista (Casa da Música)", "Campanhã"], "404": ["Hospital de São João", "Campanhã (TIC)"],
            "500": ["São Bento", "Matosinhos (Mercado)"], "501": ["Aliados", "Matosinhos (Praia)"], "502": ["Bolhão", "Matosinhos (Mercado)"], "503": ["Boavista", "Gatões"], "504": ["Boavista (Casa da Música)", "Norteshopping"], "505": ["Hospital de São João", "Matosinhos (Mercado)"], "506": ["Hospital de São João", "Matosinhos (Mercado)"], "507": ["Cordoaria", "MAR Shopping"], "508": ["Boavista", "Cabo do Mundo"],
            "600": ["Aliados", "Maia"], "601": ["Cordoaria", "Aeroporto (Via Mar Shopping)"], "602": ["Cordoaria", "Aeroporto (Via Padrão de Moreira)"], "603": ["Marquês", "Maia (Espido)"], "604": ["Hospital de São João", "Aeroporto (Via Crestins)"], "605": ["Marquês", "Maia (Barca)"],
            "700": ["Bolhão", "Campo"], "701": ["Bolhão", "Codiceira"], "702": ["Bolhão", "Travagem"], "703": ["Cordoaria", "Ermesinde (Via Sonhos)"], "704": ["Boavista", "Codiceira"], "705": ["Hospital de São João", "Valongo (Continente)"], "706": ["Hospital de São João", "Ermesinde (Estação)"], "707": ["Hospital de São João", "Ermesinde (Estação)"],
            "800": ["Bolhão", "Gondomar"], "801": ["Cordoaria", "São Pedro da Cova"], "803": ["Boavista", "Rio Tinto (Escola Secundária)"], "804": ["Hospital de São João", "São Pedro da Cova"], "805": ["Marquês", "Rio Tinto (Estação)"], "806": ["Marquês", "Fânzeres (Metro)"],
            "900": ["Cordoaria", "Francelos"], "901": ["Trindade", "Valadares"], "902": ["Boavista", "Lavadores"], "903": ["Boavista", "Laborim"], "904": ["Bolhão", "Coimbrões"], "905": ["Trindade", "Madalena (Centro Saúde)"], "906": ["Trindade", "Madalena"], "907": ["Boavista", "Vila D'Este"],
            "1M": ["Aliados", "Matosinhos (Praia)"], "2M": ["Aliados", "Hospital de São João"], "3M": ["Aliados", "Aeroporto"], "4M": ["Aliados", "Maia (Câmara)"], "5M": ["Aliados", "Ermesinde (Estação)"], "7M": ["Aliados", "Valongo"], "8M": ["Aliados", "São Pedro da Cova"], "9M": ["Aliados", "Gondomar (Via TIC)"], "10M": ["Aliados", "Vila D'Este"], "11M": ["Hospital de São João", "Coimbrões"], "12M": ["Aliados", "Santo Ovídio"], "13M": ["Aliados", "Matosinhos (Mercado)"],
            "ZC": ["Estádio do Dragão", "Areias"]
        };

        const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([41.1579, -8.6291], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        let busMarkers = {};
        let isZooming = false;

        map.on('zoomstart', () => { isZooming = true; });
        map.on('zoomend', () => { isZooming = false; });

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            if (isZooming) return;
            try {
                // Fetching from the new STCP Live API
                const url = 'https://stcp.live/api/vehicles?t=' + Date.now();
                const response = await fetch(url);
                const data = await response.json();

                const activeIds = new Set();

                data.forEach(bus => {
                    // Mapped to your screenshot structure
                    const id = bus.id;               // e.g. "1324"
                    const lat = bus.lat;             // e.g. 41.166283
                    const lon = bus.lng;             // e.g. -8.678182
                    const line = bus.routeId;        // e.g. "502"
                    const bearing = bus.bearing;     // e.g. 280
                    const directionId = bus.directionId; // 0 or 1

                    if (!lat || !lon) return;
                    activeIds.add(id);

                    // Destination mapping logic
                    let sentidoText = directionId;
                    if (lineDestinations[line]) {
                        // In STCP 0 is usually the return, 1 is the outbound
                        sentidoText = (directionId === 0) ? lineDestinations[line][1] : lineDestinations[line][0];
                    }

                    const popupContent = `<b>${line} | ${sentidoText} | ${id}</b>`;

                    if (busMarkers[id]) {
                        const marker = busMarkers[id];
                        // Update position
                        marker.setLatLng([lat, lon]);
                        // Update popup
                        if (marker.getPopup().getContent() !== popupContent) marker.setPopupContent(popupContent);
                        // Update rotation
                        const iconWrapper = marker.getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        // Create new marker
                        const color = getBusColor(line);
                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l5 8H15z" fill="white" />
                                </svg>
                            </div>`;
                        
                        const marker = L.marker([lat, lon], { 
                            icon: L.divIcon({ 
                                className: 'bus-custom-icon', 
                                html: iconHtml, 
                                iconSize: [40, 40], 
                                iconAnchor: [20, 20] 
                            })
                        }).addTo(map);
                        
                        marker.bindPopup(popupContent);
                        busMarkers[id] = marker;
                    }
                });

                // Remove buses no longer in the API
                for (const id in busMarkers) {
                    if (!activeIds.has(id)) { 
                        map.removeLayer(busMarkers[id]); 
                        delete busMarkers[id]; 
                    }
                }

                // Update UI Dashboard
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                document.getElementById('timestamp').innerText = `Last Update: ${new Date().toLocaleTimeString('pt-PT')}`;

            } catch (e) { 
                console.error("Update failed:", e); 
            }
        }

        updateBuses();
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
