<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: white; padding: 12px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #00f3ff;
            text-align: right; pointer-events: none;
        }
        .gps-button {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            width: 50px; height: 50px; background: #1a1a1a;
            border: 2px solid #00f3ff; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .bus-wrapper { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .bus-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; z-index: 2; }
        .bus-direction { position: absolute; width: 100%; height: 100%; z-index: 1; transition: transform 0.5s ease; }
        .leaflet-marker-icon { transition: all 0.5s linear !important; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 18px;">Iniciando...</div>
        <div id="timestamp" style="font-size:11px; color:#00f3ff; margin-top:4px;">A carregar frota...</div>
    </div>
    
    <div id="map"></div>
    <div class="gps-button" onclick="centerMap()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.1579, -8.6291], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let busMarkers = {};
        let userPos = null;

        map.on('locationfound', (e) => { userPos = e.latlng; });
        map.locate({ watch: true });
        function centerMap() { if (userPos) map.flyTo(userPos, 16); }

        function getStyle(line) {
            const s = line.toString();
            if (s.endsWith('M')) return '#000';
            if (s.startsWith('5')) return '#fcd116';
            if (s.startsWith('7')) return '#ff0000';
            if (s.startsWith('9')) return '#ff7900';
            return '#187ec2';
        }

        async function updateBuses() {
            try {
                // SWITCHED PROXY: allorigins is better at handling the STCP compression issue
                const target = `https://stcp.live/api/vehicles?t=${Date.now()}`;
                const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error("Proxy error");
                
                const data = await response.json();
                const currentIds = new Set();

                data.forEach(bus => {
                    const { id, lat, lng, routeId, bearing } = bus;
                    if (!lat || !lng) return;
                    currentIds.add(id);

                    if (busMarkers[id]) {
                        busMarkers[id].setLatLng([lat, lng]);
                        const icon = busMarkers[id].getElement();
                        if (icon) {
                            const svg = icon.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const color = getStyle(routeId);
                        const html = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background:${color}"></div>
                                <svg class="bus-direction" style="transform:rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l6 10H14z" fill="white" />
                                </svg>
                            </div>`;

                        busMarkers[id] = L.marker([lat, lng], {
                            icon: L.divIcon({ className: '', html: html, iconSize: [40, 40], iconAnchor: [20, 20] })
                        }).addTo(map).bindPopup(`<b>Linha ${routeId}</b><br>Viatura: ${id}`);
                    }
                });

                // Clean up vanished buses
                Object.keys(busMarkers).forEach(id => {
                    if (!currentIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                    }
                });

                document.getElementById('counter').innerText = `Autocarros: ${data.length}`;
                document.getElementById('timestamp').innerText = `Sync: ${new Date().toLocaleTimeString()}`;

            } catch (err) {
                console.error("Critical Fetch Error:", err);
                document.getElementById('timestamp').innerText = "Erro de Ligação...";
            }
        }

        setInterval(updateBuses, 5000);
        updateBuses();
    </script>
</body>
</html>
