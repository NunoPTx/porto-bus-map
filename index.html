<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Network Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #050505; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #050505; }
        #status {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: #00f3ff; padding: 15px;
            border-radius: 4px; font-family: 'Monaco', monospace; 
            border: 1px solid #00f3ff; pointer-events: none;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="status">System: Initializing Network Render...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Setup map with Canvas renderer for performance
        const map = L.map('map', { 
            zoomControl: false, 
            preferCanvas: true 
        }).setView([41.1579, -8.6291], 13);

        // Cleanest Dark Map tiles for network visibility
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#666666'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function renderNetwork() {
            const statusEl = document.getElementById('status');
            try {
                statusEl.innerText = "Status: Fetching Shapes...";
                const response = await fetch('shapes.txt');
                const text = await response.text();
                const lines = text.split('\n');
                
                const routeShapes = {};

                statusEl.innerText = "Status: Processing Data...";
                
                // Parse CSV and group coordinates by shape_id
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length < 5) continue;

                    const lat = parseFloat(row[0]);
                    const lng = parseFloat(row[1]);
                    const shapeId = row[3]; // format usually: LINE_0_DIRECTION
                    const seq = parseInt(row[4]);

                    if (!routeShapes[shapeId]) {
                        const parts = shapeId.split('_');
                        routeShapes[shapeId] = {
                            line: parts[0],
                            direction: parts[parts.length - 1], // Last digit
                            points: []
                        };
                    }
                    routeShapes[shapeId].points.push({ lat, lng, seq });
                }

                statusEl.innerText = "Status: Rendering Vectors...";
                
                Object.keys(routeShapes).forEach(id => {
                    const shape = routeShapes[id];
                    // Ensure points are in order
                    shape.points.sort((a, b) => a.seq - b.seq);
                    const path = shape.points.map(p => [p.lat, p.lng]);
                    
                    // Logic: Direction '1' is bright, Direction '2' (or others) is soft
                    const isMainDirection = shape.direction === "1";
                    
                    L.polyline(path, {
                        color: getBusColor(shape.line),
                        weight: isMainDirection ? 2.5 : 1.5,
                        opacity: isMainDirection ? 0.7 : 0.15,
                        interactive: false
                    }).addTo(map);
                });

                statusEl.innerText = "Status: Complete";
                setTimeout(() => { statusEl.style.opacity = '0.3'; }, 2000);

            } catch (e) {
                console.error(e);
                statusEl.innerText = "Error: shapes.txt not found";
            }
        }

        renderNetwork();
    </script>
</body>
</html>
