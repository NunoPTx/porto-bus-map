<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; }
        #map { height: 100vh; width: 100vw; }
        /* Style the popup text for better readability */
        .leaflet-popup-content { font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([41.1579, -8.6291], 13);

        // Dark Map Background
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let busLayer = L.layerGroup().addTo(map);

        // Logic to pick color based on the Line Number
        function getBusColor(line) {
            if (line.endsWith('M')) return '#000000'; 
            if (line.startsWith('5')) return '#fcd116'; 
            if (line.startsWith('2') || line.startsWith('3') || line.startsWith('4') || line.startsWith('1')) return '#187ec2';
            if (line.startsWith('6')) return '#00ac00'; 
            if (line.startsWith('7')) return '#ff0000'; 
            if (line.startsWith('8')) return '#a347ff'; 
            if (line.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            try {
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000');
                const data = await response.json();

                busLayer.clearLayers();

                data.forEach(bus => {
                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        
                        // Extract the Line (e.g., 500) and the Full ID
                        const fullId = bus.id;
                        const lineName = fullId.split(':').pop(); 

                        const busColor = getBusColor(lineName);

                        const marker = L.circleMarker([lat, lon], {
                            radius: 7,
                            fillColor: busColor,
                            color: "#fff", // White border so Black/Dark dots show up
                            weight: 1.5,
                            opacity: 1,
                            fillOpacity: 0.9
                        });

                        // Display LINE | ID as requested
                        marker.bindPopup(`${lineName} | ${fullId}`);
                        busLayer.addLayer(marker);
                    }
                });
            } catch (error) {
                console.error("API Error:", error);
            }
        }

        updateBuses();
        setInterval(updateBuses, 30000); // Auto-refresh every 30 seconds
    </script>
</body>
</html>
