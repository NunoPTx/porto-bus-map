<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }
        .bus-wrapper {
            position: relative; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .bus-dot {
            width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 2;
        }
        .bus-direction {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; transition: transform 0.5s ease-in-out;
            z-index: 1; pointer-events: none;
        }
        @media (max-width: 768px) { .bus-wrapper { transform: scale(0.7); } }
        .leaflet-marker-icon { transition: none !important; background: none !important; border: none !important; }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Connecting...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Waiting for data...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const lineDestinations = {
            "200": ["Bolhão", "Castelo do Queijo"], "201": ["Aliados", "Viso"], "202": ["Aliados", "Passeio Alegre"], "203": ["Estádio do Dragão", "Boavista"], "204": ["Hosp. S. João", "Foz"], "205": ["Campanhã", "Castelo do Queijo"], "206": ["Campanhã", "Viso"], "207": ["Campanhã", "Foz"], "208": ["Aliados", "Aldoar"], "209": ["Pasteleira", "Prelada"],
            "300": ["Circular", "Circular"], "301": ["Circular", "Circular"], "302": ["Circular", "Circular"], "303": ["Circular", "Circular"], "304": ["Aliados", "Santa Luzia"], "305": ["Cordoaria", "Hosp. S. João"],
            "400": ["Aliados", "Parque Nascente"], "401": ["Bolhão", "São Roque"], "402": ["Boavista", "São Roque"], "403": ["Boavista", "Campanhã"], "404": ["Campanhã", "Hosp. S. João"],
            "500": ["São Bento", "Matosinhos"], "501": ["Aliados", "Matosinhos"], "502": ["Bolhão", "Matosinhos"], "503": ["Boavista", "Gatões"], "504": ["Boavista", "Norteshopping"], "505": ["Hosp. S. João", "Matosinhos"], "506": ["Hosp. S. João", "Matosinhos"], "507": ["Cordoaria", "MAR Shopping"], "508": ["Boavista", "Cabo do Mundo"],
            "600": ["Aliados", "Maia"], "601": ["Cordoaria", "Aeroporto"], "602": ["Cordoaria", "Aeroporto"], "603": ["Marquês", "Maia"], "604": ["Hosp. S. João", "Aeroporto"], "605": ["Marquês", "Maia"],
            "700": ["Bolhão", "Campo"], "701": ["Bolhão", "Codiceira"], "702": ["Bolhão", "Travagem"], "703": ["Cordoaria", "Ermesinde"], "704": ["Boavista", "Codiceira"], "705": ["Hosp. S. João", "Valongo"], "706": ["Hosp. S. João", "Ermesinde"], "707": ["Hosp. S. João", "Ermesinde"],
            "800": ["Bolhão", "Gondomar"], "801": ["Cordoaria", "S. Pedro Cova"], "803": ["Boavista", "Rio Tinto"], "804": ["Hosp. S. João", "S. Pedro Cova"], "805": ["Marquês", "Rio Tinto"], "806": ["Marquês", "Fânzeres"],
            "900": ["Cordoaria", "Francelos"], "901": ["Trindade", "Valadares"], "902": ["Boavista", "Lavadores"], "903": ["Boavista", "Laborim"], "904": ["Bolhão", "Coimbrões"], "905": ["Trindade", "Madalena"], "906": ["Trindade", "Madalena"], "907": ["Boavista", "Vila D'Este"],
            "1M": ["Aliados", "Matosinhos"], "2M": ["Aliados", "Hosp. S. João"], "3M": ["Aliados", "Aeroporto"], "4M": ["Aliados", "Maia"], "5M": ["Aliados", "Ermesinde"], "7M": ["Aliados", "Valongo"], "8M": ["Aliados", "S. Pedro Cova"], "9M": ["Aliados", "Gondomar"], "10M": ["Aliados", "Vila D'Este"], "11M": ["Hosp. S. João", "Coimbrões"], "12M": ["Aliados", "Sto. Ovídio"], "13M": ["Aliados", "Matosinhos"],
            "107": ["Estádio do Dragão", "Areias"]
        };

        const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([41.1579, -8.6291], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        let busMarkers = {};
        let isZooming = false;
        let currentRouteLine = null;
        let cachedShapes = null;

        map.on('zoomstart', () => { isZooming = true; });
        map.on('zoomend', () => { isZooming = false; });

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function drawRoute(line, directionId) {
            if (currentRouteLine) {
                map.removeLayer(currentRouteLine);
                currentRouteLine = null;
            }
            
            try {
                if (!cachedShapes) {
                    const response = await fetch('shapes.txt');
                    cachedShapes = await response.text();
                }
                
                const lines = cachedShapes.split('\n');
                let coordsWithSequence = [];
                const targetPrefix = `${line}_0_${directionId + 1}`;
                let detectedVariant = null;

                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length < 5) continue;
                    
                    const shapeId = row[3];
                    if (shapeId.startsWith(targetPrefix)) {
                        if (!detectedVariant) detectedVariant = shapeId;
                        if (shapeId === detectedVariant) {
                            coordsWithSequence.push({
                                lat: parseFloat(row[0]),
                                lng: parseFloat(row[1]),
                                seq: parseInt(row[4])
                            });
                        }
                    }
                }

                coordsWithSequence.sort((a, b) => a.seq - b.seq);
                const finalCoords = coordsWithSequence.map(c => [c.lat, c.lng]);

                if (finalCoords.length > 0) {
                    currentRouteLine = L.polyline(finalCoords, {
                        color: getBusColor(line),
                        weight: 3,
                        opacity: 1.0, // 100% Opaco
                        dashArray: null,
                        lineJoin: 'round',
                        interactive: false
                    }).addTo(map);
                }
            } catch (e) {
                console.error("Erro no trajeto:", e);
            }
        }

        async function updateBuses() {
            if (isZooming) return;
            try {
                const url = 'https://corsproxy.io/?' + encodeURIComponent('https://stcp.live/api/vehicles?t=' + Date.now());
                const response = await fetch(url);
                const data = await response.json();

                const activeIds = new Set();

                data.forEach(bus => {
                    const id = bus.id;
                    const lat = bus.lat;
                    const lon = bus.lng;
                    const line = bus.routeId;
                    const bearing = bus.bearing;
                    const directionId = bus.directionId; 

                    if (!lat || !lon) return;
                    activeIds.add(id);

                    let sentidoText = directionId;
                    if (lineDestinations[line]) {
                        sentidoText = (directionId === 0) ? lineDestinations[line][1] : lineDestinations[line][0];
                    }

                    const popupContent = `<b>${line} | ${sentidoText} | ${id}</b>`;

                    if (busMarkers[id]) {
                        const marker = busMarkers[id];
                        marker.setLatLng([lat, lon]);
                        if (marker.getPopup().getContent() !== popupContent) marker.setPopupContent(popupContent);
                        
                        const iconWrapper = marker.getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const color = getBusColor(line);
                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l5 8H15z" fill="white" />
                                </svg>
                            </div>`;
                        
                        const marker = L.marker([lat, lon], { 
                            icon: L.divIcon({ 
                                className: 'bus-custom-icon', 
                                html: iconHtml, 
                                iconSize: [40, 40], 
                                iconAnchor: [20, 20] 
                            })
                        }).addTo(map);
                        
                        marker.bindPopup(popupContent);
                        
                        marker.on('click', () => drawRoute(line, directionId));

                        marker.on('popupclose', () => {
                            if (currentRouteLine) {
                                map.removeLayer(currentRouteLine);
                                currentRouteLine = null;
                            }
                        });

                        busMarkers[id] = marker;
                    }
                });

                for (const id in busMarkers) {
                    if (!activeIds.has(id)) { 
                        map.removeLayer(busMarkers[id]); 
                        delete busMarkers[id]; 
                    }
                }

                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                document.getElementById('timestamp').innerText = `Last Update: ${new Date().toLocaleTimeString('pt-PT')}`;

            } catch (e) { 
                console.error("Update failed:", e); 
            }
        }

        updateBuses();
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
