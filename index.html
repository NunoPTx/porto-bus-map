<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }

        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px 14px;
            border-radius: 8px; font-family: monospace; border: 1px solid #333;
            text-align: right; pointer-events: none; min-width: 200px;
        }
        #counter { font-weight: bold; font-size: 15px; }
        #timestamp { font-size: 10px; color: #aaa; margin-top: 3px; }
        #proxy-label { font-size: 9px; color: #666; margin-top: 2px; }

        .bus-wrapper {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .bus-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid white; z-index: 2; position: relative;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }
        .bus-direction {
            position: absolute; width: 40px; height: 40px;
            top: 0; left: 0; z-index: 1;
            transform-origin: center center;
            transition: transform 0.8s ease-in-out;
        }

        #error-banner {
            display: none;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(180,40,40,0.95); color: white;
            padding: 8px 16px; border-radius: 6px; font-family: monospace;
            font-size: 11px; max-width: 92vw; text-align: center;
            border: 1px solid #f66;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter">
            <span id="status-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:5px;vertical-align:middle"></span>
            Buses: —
        </div>
        <div id="timestamp">Connecting...</div>
        <div id="proxy-label">via: —</div>
    </div>
    <div id="error-banner"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-marker-slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>

    <script>
    (() => {
        const TARGET = 'https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000';
        const POLL_MS     = 4000;
        const TIMEOUT_MS  = 12000;
        const MAX_BACKOFF = 30000;

        // Each proxy has a name, url builder, and response parser.
        // allorigins wraps the body in JSON so needs special parsing.
        const PROXIES = [
            {
                name: 'direct',
                url:   t => t,
                parse: r => r.json()
            },
            {
                name: 'corsfix',
                url:   t => `https://proxy.corsfix.com/?${encodeURIComponent(t)}`,
                parse: r => r.json()
            },
            {
                name: 'corsproxy.io',
                url:   t => `https://corsproxy.io/?url=${encodeURIComponent(t)}`,
                parse: r => r.json()
            },
            {
                name: 'allorigins',
                url:   t => `https://api.allorigins.win/get?url=${encodeURIComponent(t)}`,
                parse: async r => {
                    const wrapper = await r.json();
                    if (!wrapper.contents) throw new Error('allorigins: empty contents');
                    return JSON.parse(wrapper.contents);
                }
            },
            {
                name: 'thingproxy',
                url:   t => `https://thingproxy.freeboard.io/fetch/${t}`,
                parse: r => r.json()
            },
        ];

        // ── Map ──────────────────────────────────────────────────────────────
        const map = L.map('map', { zoomControl: false }).setView([41.1579, -8.6291], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO', maxZoom: 19
        }).addTo(map);

        // ── State ────────────────────────────────────────────────────────────
        let busMarkers = {};
        let isFetching = false;
        let proxyIndex = 0;
        let retryDelay = POLL_MS;
        let loopTimer  = null;

        // ── UI ───────────────────────────────────────────────────────────────
        const statusDot  = document.getElementById('status-dot');
        const counterEl  = document.getElementById('counter');
        const tsEl       = document.getElementById('timestamp');
        const proxyLabel = document.getElementById('proxy-label');
        const errBanner  = document.getElementById('error-banner');

        function setDot(color) { statusDot.style.background = color; }
        function setStatus(msg, color = '#aaa') { tsEl.style.color = color; tsEl.textContent = msg; }
        function showError(msg, autohide = 6000) {
            errBanner.textContent = msg;
            errBanner.style.display = 'block';
            if (autohide) setTimeout(() => errBanner.style.display = 'none', autohide);
        }

        // ── Colors ───────────────────────────────────────────────────────────
        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M'))                           return '#555555';
            if (/^[1-4]/.test(s) || s.includes('ZC'))     return '#187ec2';
            if (s.startsWith('5'))                         return '#fcd116';
            if (s.startsWith('6'))                         return '#00ac00';
            if (s.startsWith('7'))                         return '#ff0000';
            if (s.startsWith('8'))                         return '#a347ff';
            if (s.startsWith('9'))                         return '#ff7900';
            return '#ffffff';
        }

        // ── Fetch with timeout ────────────────────────────────────────────────
        async function fetchWithTimeout(url, ms) {
            const ctrl  = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            try {
                return await fetch(url, {
                    signal: ctrl.signal,
                    headers: { Accept: 'application/json' }
                });
            } finally {
                clearTimeout(timer);
            }
        }

        // Try from last known good proxy, rotate on failure
        async function fetchBuses() {
            const n = PROXIES.length;
            for (let i = 0; i < n; i++) {
                const idx   = (proxyIndex + i) % n;
                const proxy = PROXIES[idx];
                try {
                    console.log(`[bus] trying: ${proxy.name}`);
                    const res  = await fetchWithTimeout(proxy.url(TARGET), TIMEOUT_MS);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await proxy.parse(res);
                    if (!Array.isArray(data))  throw new Error('not an array');
                    if (data.length === 0)     throw new Error('empty array — likely truncated');
                    proxyIndex = idx;
                    proxyLabel.textContent = `via: ${proxy.name}`;
                    return data;
                } catch (e) {
                    console.warn(`[bus] "${proxy.name}" failed:`, e.message);
                }
            }
            throw new Error('All proxies exhausted');
        }

        // ── Render ───────────────────────────────────────────────────────────
        function renderBuses(data) {
            const activeIds = new Set();

            data.forEach(bus => {
                const id      = bus.id;
                const fleetId = id.split(':').pop();
                const rawName = bus.name?.value ?? '';
                const line    = rawName.replace('STCP', '').replace(fleetId, '').trim() || '??';

                const coords = bus.location?.value?.coordinates;
                if (!Array.isArray(coords)) return;
                const [lon, lat] = coords;
                if (!isFinite(lat) || !isFinite(lon)) return;

                const bearing = bus.bearing?.value ?? 0;
                const color   = getBusColor(line);
                activeIds.add(id);

                const iconHtml = `
                    <div class="bus-wrapper">
                        <div class="bus-dot" style="background-color:${color}"></div>
                        <svg class="bus-direction" style="transform:rotate(${bearing}deg)" viewBox="0 0 40 40">
                            <path d="M20 4l5 7H15z" fill="white"/>
                        </svg>
                    </div>`;

                const icon = L.divIcon({
                    className: '', html: iconHtml, iconSize: [40,40], iconAnchor: [20,20]
                });

                if (busMarkers[id]) {
                    busMarkers[id].setIcon(icon);
                    busMarkers[id].slideTo([lat, lon], { duration: 2500 });
                } else {
                    const m = L.marker([lat, lon], { icon }).addTo(map);
                    m.bindPopup(`<b>Line: ${line}</b><br>Fleet: ${fleetId}`);
                    busMarkers[id] = m;
                }
            });

            for (const id in busMarkers) {
                if (!activeIds.has(id)) {
                    map.removeLayer(busMarkers[id]);
                    delete busMarkers[id];
                }
            }

            counterEl.innerHTML = `
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
                    background:#2ecc71;margin-right:5px;vertical-align:middle"></span>
                Buses: ${activeIds.size}`;
            setStatus(`Updated ${new Date().toLocaleTimeString('pt-PT')}`, '#6f6');
        }

        // ── Poll loop ─────────────────────────────────────────────────────────
        async function tick() {
            if (isFetching) return;
            isFetching = true;
            setDot('#f0a500');

            try {
                const data = await fetchBuses();
                renderBuses(data);
                retryDelay = POLL_MS;
                errBanner.style.display = 'none';
            } catch (e) {
                console.error('[bus] update failed:', e.message);
                setDot('#e74c3c');
                const secs = Math.round(retryDelay / 1000);
                setStatus(`Failed — retry in ${secs}s`, '#f66');
                showError(`⚠ All proxies failed. Retry in ${secs}s — open F12 console for details.`);
                retryDelay = Math.min(retryDelay * 1.5, MAX_BACKOFF);
            } finally {
                isFetching = false;
                loopTimer  = setTimeout(tick, retryDelay);
            }
        }

        // ── Pause when tab hidden ─────────────────────────────────────────────
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimeout(loopTimer);
                setDot('#555');
                setStatus('Paused (tab hidden)', '#777');
            } else {
                setStatus('Resuming...', '#fa0');
                tick();
            }
        });

        tick();
    })();
    </script>
</body>
</html>
