<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }

        /* Botão Localização */
        .gps-button {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            width: 45px; height: 45px; background: rgba(20,20,20,0.9);
            border: 1.5px solid #00f3ff; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,243,255,0.2); pointer-events: auto;
            transition: all 0.2s ease;
        }
        .gps-button:active { transform: scale(0.9); background: #00f3ff; }
        .gps-button:active svg { stroke: #000; }

        /* User Marker Neon Square - Centrado */
        .user-location-marker {
            background: none !important;
            border: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neon-box {
            width: 12px; height: 12px;
            border: 2px solid #00f3ff;
            background: rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 10px #00f3ff, inset 0 0 4px #00f3ff;
            animation: pulse-neon 2s infinite;
            box-sizing: border-box;
        }

        @keyframes pulse-neon {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .bus-wrapper {
            position: relative; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .bus-dot {
            width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 2;
        }
        .bus-direction {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; transition: transform 0.5s ease-in-out;
            z-index: 1; pointer-events: none;
        }
        @media (max-width: 768px) { .bus-wrapper { transform: scale(0.7); } }
        .leaflet-marker-icon { transition: none !important; }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Connecting...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Waiting for data...</div>
    </div>
    
    <div id="map"></div>
    
    <div class="gps-button" onclick="centerMapOnUser()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
        </svg>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
const lineDestinations = {
        "200": ["Bolhão", "Castelo do Queijo"],
    	"201": ["Aliados", "Viso"],
	    "202": ["Aliados", "Passeio Alegre"],
	    "203": ["Estádio do Dragão", "Boavista (Casa da Música)"],
	    "204": ["Hospital de São João", "Foz"],
	    "205": ["Campanhã", "Castelo do Queijo"],
	    "206": ["Campanhã", "Viso"],
	    "207": ["Campanhã", "Foz (Mercado)"],
    	"208": ["Aliados", "Aldoar"],
	    "209": ["Pasteleira", "Prelada"],
        "300": ["Circular (Via Hospital de São João / Aliados)", "Circular (Via Hospital de São João / Aliados)"],
    	"301": ["Circular (Via Hospital de São João / Sá da Bandeira)", "Circular (Via Hospital de São João / Sá da Bandeira)"],
	    "302": ["Circular (Via Aliados / Damião de Góis)", "Circular (Via Aliados / Damião de Góis)"],
        "303": ["Circular (Via Praça da Liberdade / Constituição)", "Circular (Via Praça da Liberdade / Constituição)"],
	    "304": ["Aliados", "Santa Luzia"],
	    "305": ["Cordoaria", "Hospital de São João"],
    	"400": ["Aliados", "Parque Nascente"],
    	"401": ["Bolhão", "São Roque"],
        "402": ["Boavista (Bom Sucesso)", "São Roque"],
	    "403": ["Boavista (Casa da Música)", "Campanhã"],
	    "404": ["Campanhã (TIC)", "Hospital de São João"],
    	"500": ["São Bento", "Matosinhos (Mercado)"],
	    "501": ["Aliados", "Matosinhos (Praia)"],
	    "502": ["Bolhão", "Matosinhos (Mercado)"],
    	"503": ["Boavista (Bom Sucesso)", "Gatões"],
	    "504": ["Boavista (Casa da Música)", "Norteshopping"],
    	"505": ["Hospital de São João", "Matosinhos (Mercado)"],
    	"506": ["Hospital de São João", "Matosinhos (Mercado)"],
    	"507": ["Cordoaria", "MAR Shopping"],
    	"508": ["Boavista (Casa da Música)", "Cabo do Mundo (Via MAR Shopping)"],
	    "600": ["Aliados", "Maia"],
	    "601": ["Cordoaria", "Aeroporto (Via Mar Shopping)"],
    	"602": ["Cordoaria", "Aeroporto (Via Padrão de Moreira)"],
	    "603": ["Marquês", "Maia (Espido)"],
	    "604": ["Hospital de São João", "Aeroporto (Via Crestins)"],
	    "605": ["Marquês", "Maia (Barca)"],
	    "700": ["Bolhão", "Campo"],
	    "701": ["Bolhão", "Codiceira"],
	    "702": ["Bolhão", "Travagem"],
    	"703": ["Cordoaria", "Ermesinde (Via Sonhos)"],
	    "704": ["Boavista (Casa da Música)", "Codiceira"],
    	"705": ["Hospital de São João", "Valongo (Continente)"],
    	"706": ["Hospital de São João", "Ermesinde (Estação) (Via Monte Penedo)"],
    	"707": ["Hospital de São João", "Ermesinde (Estação) (Via Arregadas)"],
    	"800": ["Bolhão", "Gondomar"],
	    "801": ["Cordoaria", "São Pedro da Cova"],
	    "803": ["Boavista (Bom Sucesso)", "Rio Tinto (Escola Secundária)"],
    	"804": ["Hospital de São João", "São Pedro da Cova"],
    	"805": ["Marquês", "Rio Tinto (Estação)"],
	    "806": ["Marquês", "Fânzeres (Metro)"],
        "900": ["Cordoaria", "Francelos"],
	    "901": ["Trindade", "Valadares"],
    	"902": ["Boavista (Casa da Música)", "Lavadores"],
    	"903": ["Boavista (Casa da Música)", "Laborim"],
	    "904": ["Trindade", "Coimbrões"],
    	"905": ["Trindade", "Madalena (Centro Saúde)"],
	    "906": ["Trindade", "Madalena"],
    	"907": ["Boavista (Bom Sucesso)", "Vila D'Este"],
	    "1M": ["Aliados", "Matosinhos (Praia)"],
    	"2M": ["Aliados", "Hospital de São João"],
    	"3M": ["Aliados", "Aeroporto"],
    	"4M": ["Aliados", "Maia (Câmara)"],
	    "5M": ["Aliados", "Ermesinde (Estação)"],
	    "7M": ["Aliados", "Valongo"],
	    "8M": ["Aliados", "São Pedro da Cova"],
    	"9M": ["Aliados", "Gondomar (Via TIC)"],
    	"10M": ["Aliados", "Vila D'Este"],
    	"11M": ["Hospital de São João", "Coimbrões"],
	    "12M": ["Aliados", "Santo Ovídio"],
    	"13M": ["Aliados", "Matosinhos (Mercado)"],
	    "107": ["Estádio do Dragão", "Areias"]
        };

		const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([41.1579, -8.6291], 14);
		L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
		    attribution: '&copy; Esri, HERE, Garmin, FAO, NOAA, USGS, EPA',
		    maxZoom: 16
		}).addTo(map);

        let busMarkers = {};
        let isZooming = false;
        let currentRouteLine = null;
        let cachedShapes = null;
        
        let userMarker = null;
        let userPos = null;

        map.on('zoomstart', () => { isZooming = true; });
        map.on('zoomend', () => { isZooming = false; });

        // --- LÓGICA GPS CORRIGIDA ---
        map.on('locationfound', (e) => {
            userPos = e.latlng;
            if (!userMarker) {
                userMarker = L.marker(userPos, {
                    zIndexOffset: 1000,
                    icon: L.divIcon({
                        className: 'user-location-marker',
                        html: '<div class="neon-box"></div>',
                        iconSize: [12, 12],
                        iconAnchor: [6, 6] // Metade exacta do iconSize para centrar
                    })
                }).addTo(map);
            } else {
                userMarker.setLatLng(userPos);
            }
        });

        map.locate({ watch: true, enableHighAccuracy: true });

        function centerMapOnUser() {
            if (userPos) {
                map.flyTo(userPos, 16, { duration: 1.5 });
            } else {
                alert("A aguardar sinal GPS...");
            }
        }
        // ---------------------------

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function drawRoute(line, directionId) {
            if (currentRouteLine) { map.removeLayer(currentRouteLine); currentRouteLine = null; }
            try {
                if (!cachedShapes) {
                    const response = await fetch('shapes.txt');
                    cachedShapes = await response.text();
                }
                const lines = cachedShapes.split('\n');
                let coordsWithSequence = [];
                const circularLines = ["300", "301", "302", "303"];
                const routeIdInFile = circularLines.includes(line.toString()) ? "3" : (directionId + 1);
                const targetPrefix = `${line}_0_${routeIdInFile}`;
                let detectedVariant = null;
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length < 5) continue;
                    const shapeId = row[3];
                    if (shapeId.startsWith(targetPrefix)) {
                        if (!detectedVariant) detectedVariant = shapeId;
                        if (shapeId === detectedVariant) {
                            coordsWithSequence.push({ lat: parseFloat(row[0]), lng: parseFloat(row[1]), seq: parseInt(row[4]) });
                        }
                    }
                }
                coordsWithSequence.sort((a, b) => a.seq - b.seq);
                const finalCoords = coordsWithSequence.map(c => [c.lat, c.lng]);
                if (finalCoords.length > 0) {
                    currentRouteLine = L.polyline(finalCoords, { color: getBusColor(line), weight: 3, opacity: 1.0, lineJoin: 'round', interactive: false }).addTo(map);
                }
            } catch (e) { console.error(e); }
        }
        
        async function updateBuses() {
            if (isZooming) return;
            try {
				const t = Date.now();
				const proxies = [
				    'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://stcp.live/api/vehicles?t=' + t),
				    'https://corsproxy.io/?' + encodeURIComponent('https://stcp.live/api/vehicles?t=' + t),
				    'https://api.codetabs.com/v1/proxy?quest=https://stcp.live/api/vehicles?t=' + t
				];
				let data = null;
				for (const url of proxies) {
				    try {
				        const r = await fetch(url);
				        const text = await r.text();
				        if (text.trim().startsWith('[')) { data = JSON.parse(text); break; }
				    } catch(e) { continue; }
				}
				if (!data) return;
                const activeIds = new Set();
                data.forEach(bus => {
                    const id = bus.id; const lat = bus.lat; const lon = bus.lng; const line = bus.routeId;
                    const bearing = bus.bearing; const directionId = bus.directionId; 
                    if (!lat || !lon) return; activeIds.add(id);
                    let sentidoText = directionId;
                    if (lineDestinations[line]) { sentidoText = (directionId === 0) ? lineDestinations[line][1] : lineDestinations[line][0]; }
                    const popupContent = `<b>${line} | ${sentidoText} | ${id}</b>`;
                    if (busMarkers[id]) {
                        const marker = busMarkers[id];
                        marker.setLatLng([lat, lon]);
                        if (marker.getPopup().getContent() !== popupContent) marker.setPopupContent(popupContent);
                        const iconWrapper = marker.getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const color = getBusColor(line);
                        const iconHtml = `<div class="bus-wrapper"><div class="bus-dot" style="background-color: ${color}"></div><svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40"><path d="M20 4l5 8H15z" fill="white" /></svg></div>`;
                        const marker = L.marker([lat, lon], { icon: L.divIcon({ className: 'bus-custom-icon', html: iconHtml, iconSize: [40, 40], iconAnchor: [20, 20] }) }).addTo(map);
                        marker.bindPopup(popupContent);
                        marker.on('click', () => drawRoute(line, directionId));
                        marker.on('popupclose', () => { if (currentRouteLine) { map.removeLayer(currentRouteLine); currentRouteLine = null; } });
                        busMarkers[id] = marker;
                    }
                });
                for (const id in busMarkers) { if (!activeIds.has(id)) { map.removeLayer(busMarkers[id]); delete busMarkers[id]; } }
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                document.getElementById('timestamp').innerText = `Last Update: ${new Date().toLocaleTimeString('pt-PT')}`;
            } catch (e) { console.error(e); }
        }

        updateBuses();
        setInterval(updateBuses, 1000); 
    </script>
</body>
</html>
