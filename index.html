<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; touch-action: none; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }

        /* Perfectly centered container */
        .bus-wrapper {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* The central colored dot */
        .bus-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            z-index: 2;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        /* The SVG arrow - centered rotation */
        .bus-direction {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 1;
            transform-origin: center center;
            transition: transform 0.8s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Buses: Loading...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Syncing...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-marker-slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.1579, -8.6291], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        let busMarkers = {};

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            if (map._animatingZoom || map.dragging.moving()) return;

            try {
                const url = 'https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now();
                const response = await fetch(url, { cache: "no-store" });
                const data = await response.json();
                
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                document.getElementById('timestamp').innerText = `Last Sync: ${new Date().toLocaleTimeString('pt-PT')}`;
                
                const activeIds = new Set();

                data.forEach(bus => {
                    const id = bus.id;
                    const fleetId = id.split(':').pop();
                    let line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        const bearing = (bus.bearing && bus.bearing.value) ? bus.bearing.value : 0;
                        const color = getBusColor(line);
                        activeIds.add(id);

                        // Icon Template: Triangle base starts near the circle edge
                        // M12 0 means tip at top center, L16 8 L8 8 closes the triangle
                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 24 24">
                                    <path d="M12 0l4 8H8z" fill="white" stroke="black" stroke-width="0.5"/>
                                </svg>
                            </div>
                        `;

                        const busIcon = L.divIcon({
                            className: '', 
                            html: iconHtml,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        if (busMarkers[id]) {
                            busMarkers[id].setIcon(busIcon);
                            busMarkers[id].slideTo([lat, lon], { duration: 2000 });
                        } else {
                            const marker = L.marker([lat, lon], { icon: busIcon }).addTo(map);
                            marker.bindPopup(`<b>Line: ${line}</b><br>Fleet: ${fleetId}`);
                            busMarkers[id] = marker;
                        }
                    }
                });

                for (const id in busMarkers) {
                    if (!activeIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                    }
                }

            } catch (e) { 
                console.error("Fetch Error:", e);
                document.getElementById('timestamp').innerText = "Reconnecting...";
            }
        }

        updateBuses();
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
