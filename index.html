<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Pro Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; }
        #map { height: 100vh; width: 100vw; }
        #counter {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div id="counter">Buses: 0</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-marker-slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([41.1579, -8.6291], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // We store markers in an object so we can move them instead of deleting them
        const busMarkers = {};

        function getBusColor(line) {
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            try {
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now());
                const data = await response.json();
                
                document.getElementById('counter').innerText = `Buses Live: ${data.length}`;

                const currentIds = new Set();

                data.forEach(bus => {
                    const id = bus.id;
                    const fleetId = id.split(':').pop();
                    const line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";
                    
                    if (bus.location && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        currentIds.add(id);

                        if (busMarkers[id]) {
                            // If bus exists, SLIDE it to the new spot over 2 seconds
                            busMarkers[id].slideTo([lat, lon], { duration: 2000 });
                        } else {
                            // If it's a new bus, create it
                            const marker = L.circleMarker([lat, lon], {
                                radius: 8,
                                fillColor: getBusColor(line),
                                color: "#fff",
                                weight: 2,
                                fillOpacity: 1
                            }).addTo(map);
                            
                            marker.bindPopup(`<b>${line} | ${fleetId}</b>`);
                            busMarkers[id] = marker;
                        }
                    }
                });

                // Remove buses that are no longer active
                for (const id in busMarkers) {
                    if (!currentIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                    }
                }

            } catch (e) { console.error(e); }
        }

        updateBuses();
        // Update every 5 seconds for a balance of speed and stability
        setInterval(updateBuses, 5000); 
    </script>
</body>
</html>
