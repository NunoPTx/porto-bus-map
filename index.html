<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STCP Smart Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: white; padding: 12px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }
        .bus-wrapper { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .bus-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; z-index: 2; box-shadow: 0 0 8px rgba(0,0,0,0.8); }
        .bus-direction { position: absolute; width: 100%; height: 100%; top: 0; left: 0; transition: transform 0.8s ease-in-out; z-index: 1; }
        #status { font-size: 10px; color: #888; margin-top: 4px; }
        .leaflet-marker-icon { background: none !important; border: none !important; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div style="font-weight:bold; font-size: 16px; color: #fcd116;">STCP SMART TRACKER</div>
        <div id="counter">Connecting...</div>
        <div id="status">Click a bus to learn its route</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([41.1579, -8.6291], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        let busMarkers = {};
        let routeCache = {}; // Memory: Stores geometries for each line
        let activeRouteLayer = null;
        let isZooming = false;

        map.on('zoomstart', () => isZooming = true);
        map.on('zoomend', () => isZooming = false);

        function getBusColor(line) {
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#555555'; 
            if (/^[1234]/.test(s) || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function showRoute(line, directionId) {
            if (activeRouteLayer) map.removeLayer(activeRouteLayer);
            
            // Check memory
            if (routeCache[line]) {
                document.getElementById('status').innerText = `Recalling ${line} from memory...`;
                drawCachedRoute(line, directionId);
                return;
            }

            document.getElementById('status').innerText = `Learning route ${line}...`;
            
            // Fetch both directions to "learn" the full line at once
            const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json][timeout:25];relation["network"="STCP"]["ref"="${line}"]["type"="route"]["route"="bus"];out geom;`;
            
            try {
                const response = await fetch(overpassUrl);
                const data = await response.json();
                
                if (data.elements.length > 0) {
                    // Store all versions of this line in memory
                    routeCache[line] = data.elements;
                    drawCachedRoute(line, directionId);
                } else {
                    document.getElementById('status').innerText = `Path for ${line} not found.`;
                }
            } catch (e) {
                console.error("OSM Error", e);
                document.getElementById('status').innerText = "Error learning path";
            }
        }

        function drawCachedRoute(line, directionId) {
            const elements = routeCache[line];
            const latlngs = [];
            
            // Try to find the specific direction, or default to the first one found
            let routeData = elements.find(el => el.tags.direction == directionId) || elements[0];
            
            routeData.members.forEach(member => {
                if (member.type === "way" && member.geometry) {
                    member.geometry.forEach(pt => latlngs.push([pt.lat, pt.lon]));
                }
            });

            activeRouteLayer = L.polyline(latlngs, {
                color: getBusColor(line),
                weight: 5,
                opacity: 0.6,
                lineJoin: 'round'
            }).addTo(map);

            document.getElementById('status').innerText = `Line ${line} (Cached)`;
        }

        async function updateBuses() {
            if (isZooming) return;
            try {
                const targetUrl = 'https://stcp.live/api/vehicles?t=' + Date.now();
                const url = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                
                const response = await fetch(url);
                const data = await response.json();

                const activeIds = new Set();

                data.forEach(bus => {
                    const { id, lat, lng, routeId, bearing, directionId } = bus;
                    if (!lat || !lng) return;
                    activeIds.add(id);

                    if (busMarkers[id]) {
                        busMarkers[id].setLatLng([lat, lng]);
                        const iconWrapper = busMarkers[id].getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const color = getBusColor(routeId);
                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l5 8H15z" fill="white" />
                                </svg>
                            </div>`;
                        
                        const marker = L.marker([lat, lng], { 
                            icon: L.divIcon({ className: 'custom-bus', html: iconHtml, iconSize: [40, 40], iconAnchor: [20, 20] })
                        }).addTo(map);
                        
                        marker.on('click', () => showRoute(routeId, directionId));
                        marker.bindPopup(`<b>Line ${routeId}</b><br>ID: ${id}`);
                        busMarkers[id] = marker;
                    }
                });

                for (const id in busMarkers) {
                    if (!activeIds.has(id)) { map.removeLayer(busMarkers[id]); delete busMarkers[id]; }
                }

                document.getElementById('counter').innerText = `Active Buses: ${data.length}`;
            } catch (e) { console.error("Bus data error", e); }
        }

        updateBuses();
        setInterval(updateBuses, 3000);

        map.on('click', (e) => {
            if (e.originalEvent.target.id === 'map' && activeRouteLayer) {
                map.removeLayer(activeRouteLayer);
                activeRouteLayer = null;
                document.getElementById('status').innerText = "Click a bus to learn its route";
            }
        });
    </script>
</body>
</html>
