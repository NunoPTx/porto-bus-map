<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }

        /* Essential for smoothness during zoom */
        .leaflet-zoom-anim .leaflet-zoom-animated {
            will-change: transform;
        }

        .bus-wrapper {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s linear; /* Smooths the movement */
        }

        .bus-dot {
            width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        .bus-direction {
            position: absolute; width: 40px; height: 40px;
            top: 0; left: 0;
            transition: transform 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Connecting...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Waiting for data...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { 
            zoomControl: false,
            preferCanvas: true // Faster rendering for many objects
        }).setView([41.1579, -8.6291], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        let busMarkers = {};
        let isZooming = false;

        // Prevent updates during zoom to stop flickering
        map.on('zoomstart', () => { isZooming = true; });
        map.on('zoomend', () => { isZooming = false; });

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            if (isZooming) return; // Skip update if user is zooming

            try {
                const url = 'https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now();
                const response = await fetch(url);
                const data = await response.json();
                
                // --- INTEGRITY CHECK ---
                // If API returns a tiny fraction of buses, ignore the update 
                // to prevent buses from disappearing and reappearing.
                if (data.length < 50 && Object.keys(busMarkers).length > 0) {
                    console.warn("API returned partial data, skipping update...");
                    return;
                }

                const activeIds = new Set();

                // Process data before touching the DOM
                data.forEach(bus => {
                    if (!bus.location?.value?.coordinates) return;

                    const id = bus.id;
                    const [lon, lat] = bus.location.value.coordinates;
                    const bearing = bus.bearing?.value || 0;
                    activeIds.add(id);

                    if (busMarkers[id]) {
                        const marker = busMarkers[id];
                        const oldLatLng = marker.getLatLng();
                        
                        // Only move if coordinates changed
                        if (oldLatLng.lat !== lat || oldLatLng.lng !== lon) {
                            marker.setLatLng([lat, lon]);
                        }
                        
                        // Smoothly rotate the arrow
                        const iconWrapper = marker.getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const fleetId = id.split(':').pop();
                        const line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";
                        const color = getBusColor(line);

                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l5 7H15z" fill="white" />
                                </svg>
                            </div>`;

                        const marker = L.marker([lat, lon], {
                            icon: L.divIcon({ 
                                className: 'bus-icon-container', 
                                html: iconHtml, 
                                iconSize: [40, 40], 
                                iconAnchor: [20, 20] 
                            })
                        }).addTo(map);
                        
                        marker.bindPopup(`<b>Line: ${line}</b><br>Fleet: ${fleetId}`);
                        busMarkers[id] = marker;
                    }
                });

                // Remove buses that are truly gone
                for (const id in busMarkers) {
                    if (!activeIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                    }
                }

                // Update Dashboard only after full process
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                document.getElementById('timestamp').innerText = `Last Sync: ${new Date().toLocaleTimeString('pt-PT')}`;

            } catch (e) { 
                console.error("Fetch Error:", e);
            }
        }

        // Initial load
        updateBuses();
        // Regular sync
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
