<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; touch-action: none; }
        #map { height: 100vh; width: 100vw; }
        #counter {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 8px 12px;
            border-radius: 5px; font-family: sans-serif; font-size: 14px; border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div id="counter">Buses: Loading...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Use 'preferCanvas' to fix the disappearing dots bug on mobile zoom
        const map = L.map('map', { 
            zoomControl: false,
            preferCanvas: true 
        }).setView([41.1579, -8.6291], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO',
            updateWhenZooming: false,
            updateWhenIdle: true
        }).addTo(map);

        let busLayer = L.layerGroup().addTo(map);

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            try {
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now());
                const data = await response.json();
                
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                
                // Temporary array to hold new markers
                const newMarkers = [];

                data.forEach(bus => {
                    const fullId = bus.id;
                    const idParts = fullId.split(':');
                    const fleetId = idParts[idParts.length - 1];
                    let line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        
                        const marker = L.circleMarker([lat, lon], {
                            radius: 9, // Slightly larger for better visibility
                            fillColor: getBusColor(line),
                            color: "#ffffff", 
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1,
                            interactive: true
                        });

                        marker.bindPopup(`<b>${line} | ${fleetId}</b>`);
                        newMarkers.push(marker);
                    }
                });

                busLayer.clearLayers();
                newMarkers.forEach(m => busLayer.addLayer(m));

            } catch (e) { console.error("Update failed:", e); }
        }

        updateBuses();
        setInterval(updateBuses, 5000); // 5 seconds is safer for mobile stability
    </script>
</body>
</html>
