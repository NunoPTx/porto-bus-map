<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-popup-content { font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([41.1579, -8.6291], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        let busLayer = L.layerGroup().addTo(map);

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            try {
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000');
                const data = await response.json();
                busLayer.clearLayers();

                data.forEach(bus => {
                    // Extract Line (e.g., 401)
                    const line = bus.name ? bus.name.value : "??";
                    
                    // Extract Fleet ID (e.g., 3336) 
                    // Usually the last part of the ID: "urn:...:STCP:401:3336" -> "3336"
                    const idParts = bus.id.split(':');
                    const fleetId = idParts[idParts.length - 1];

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        const busColor = getBusColor(line);

                        const marker = L.circleMarker([lat, lon], {
                            radius: 8,
                            fillColor: busColor,
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        });

                        // Display exactly: LINE | FLEET ID
                        marker.bindPopup(`${line} | ${fleetId}`);
                        busLayer.addLayer(marker);
                    }
                });
            } catch (e) { console.error(e); }
        }

        updateBuses();
        setInterval(updateBuses, 30000);
    </script>
</body>
</html>
