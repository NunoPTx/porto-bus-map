<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; }
        #map { height: 100vh; width: 100vw; }
        
        /* Counter Style */
        #counter {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: sans-serif;
            font-weight: bold;
            border: 1px solid #444;
        }

        /* Styling the arrow markers */
        .bus-arrow {
            text-align: center;
            font-weight: bold;
            line-height: 1;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        }
    </style>
</head>
<body>
    <div id="counter">Buses: 0</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([41.1579, -8.6291], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        let busLayer = L.layerGroup().addTo(map);

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            try {
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000');
                const data = await response.json();
                
                // Update Counter
                document.getElementById('counter').innerText = `Buses: ${data.length}`;
                
                busLayer.clearLayers();

                data.forEach(bus => {
                    const fullId = bus.id;
                    const idParts = fullId.split(':');
                    const fleetId = idParts[idParts.length - 1];
                    let line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";

                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const [lon, lat] = bus.location.value.coordinates;
                        const busColor = getBusColor(line);
                        
                        // Get heading (direction) from API, default to 0 if missing
                        const heading = bus.heading ? bus.heading.value : 0;

                        // Create a DivIcon with an arrow character rotated
                        const arrowIcon = L.divIcon({
                            className: 'bus-arrow',
                            html: `<div style="transform: rotate(${heading}deg); color: ${busColor}; font-size: 24px;">➤</div>`,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });

                        const marker = L.marker([lat, lon], { icon: arrowIcon });
                        marker.bindPopup(`${line} | ${fleetId}`);
                        busLayer.addLayer(marker);
                    }
                });
            } catch (e) { console.error(e); }
        }

        updateBuses();
        setInterval(updateBuses, 1000);
    </script>
</body>
</html>
