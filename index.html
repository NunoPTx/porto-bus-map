<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        
        #dashboard {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: white; padding: 10px;
            border-radius: 8px; font-family: sans-serif; border: 1px solid #444;
            text-align: right; pointer-events: none;
        }

        .bus-wrapper {
            position: relative;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        .bus-dot {
            width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
            z-index: 2;
        }

        .bus-direction {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transition: transform 0.5s ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .bus-wrapper {
                transform: scale(0.7); 
            }
        }

        .leaflet-marker-icon { transition: none !important; background: none !important; border: none !important; }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="counter" style="font-weight:bold; font-size: 16px;">Connecting...</div>
        <div id="timestamp" style="font-size:10px; color:#aaa; margin-top:2px;">Waiting for data...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { 
            zoomControl: false,
            preferCanvas: true 
        }).setView([41.1579, -8.6291], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        let busMarkers = {};
        let isZooming = false;

        map.on('zoomstart', () => { isZooming = true; });
        map.on('zoomend', () => { isZooming = false; });

        function getBusColor(line) {
            if (!line) return '#ffffff';
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function updateBuses() {
            if (isZooming) return;

            try {
                const url = 'https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000&t=' + Date.now();
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.length < 50) return;

                const activeIds = new Set();
                let hasMoved = false;

                data.forEach(bus => {
                    if (!bus.location?.value?.coordinates) return;

                    const id = bus.id;
                    const [lon, lat] = bus.location.value.coordinates;
                    const bearing = bus.bearing?.value || 0;
                    const fleetId = id.split(':').pop();
                    
                    // --- NEW SENTIDO EXTRACTION LOGIC ---
                    let sentido = "?";
                    if (bus.annotations && Array.isArray(bus.annotations.value)) {
                        const sentidoEntry = bus.annotations.value.find(s => s.startsWith("stcp:sentido:"));
                        if (sentidoEntry) {
                            sentido = sentidoEntry.split(':').pop(); // Gets the "1" or "0"
                        }
                    }
                    
                    const line = bus.name ? bus.name.value.replace('STCP', '').replace(fleetId, '').trim() : "??";
                    activeIds.add(id);

                    const popupContent = `<b>${line} | ${fleetId} | ${sentido}</b>`;

                    if (busMarkers[id]) {
                        const marker = busMarkers[id];
                        const oldLatLng = marker.getLatLng();
                        
                        if (oldLatLng.lat !== lat || oldLatLng.lng !== lon) {
                            marker.setLatLng([lat, lon]);
                            hasMoved = true;
                        }

                        if (marker.getPopup().getContent() !== popupContent) {
                            marker.setPopupContent(popupContent);
                        }
                        
                        const iconWrapper = marker.getElement();
                        if (iconWrapper) {
                            const svg = iconWrapper.querySelector('.bus-direction');
                            if (svg) svg.style.transform = `rotate(${bearing}deg)`;
                        }
                    } else {
                        const color = getBusColor(line);
                        const iconHtml = `
                            <div class="bus-wrapper">
                                <div class="bus-dot" style="background-color: ${color}"></div>
                                <svg class="bus-direction" style="transform: rotate(${bearing}deg)" viewBox="0 0 40 40">
                                    <path d="M20 4l5 8H15z" fill="white" />
                                </svg>
                            </div>`;

                        const marker = L.marker([lat, lon], {
                            icon: L.divIcon({ 
                                className: 'bus-custom-icon', 
                                html: iconHtml, 
                                iconSize: [40, 40], 
                                iconAnchor: [20, 20] 
                            })
                        }).addTo(map);
                        
                        marker.bindPopup(popupContent);
                        busMarkers[id] = marker;
                        hasMoved = true;
                    }
                });

                let deleted = false;
                for (const id in busMarkers) {
                    if (!activeIds.has(id)) {
                        map.removeLayer(busMarkers[id]);
                        delete busMarkers[id];
                        deleted = true;
                    }
                }

                if (hasMoved || deleted) {
                    document.getElementById('counter').innerText = `Buses: ${data.length}`;
                    document.getElementById('timestamp').innerText = `Last Update: ${new Date().toLocaleTimeString('pt-PT')}`;
                }

            } catch (e) { 
                console.error("Fetch Error:", e);
            }
        }

        updateBuses();
        setInterval(updateBuses, 3000); 
    </script>
</body>
</html>
