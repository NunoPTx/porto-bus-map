<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map centered on Porto
        const map = L.map('map').setView([41.1579, -8.6291], 13);

        // 2. Add OpenStreetMap tiles (Free)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // A group to hold the bus markers so we can clear them when we refresh
        let busLayer = L.layerGroup().addTo(map);

        async function updateBuses() {
            try {
                // 3. Fetch data from the Porto Digital API
                const response = await fetch('https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000');
                const data = await response.json();

                // Clear old markers
                busLayer.clearLayers();

                // 4. Loop through each bus and add a dot
                data.forEach(bus => {
                    if (bus.location && bus.location.value && bus.location.value.coordinates) {
                        const coords = bus.location.value.coordinates; // [lon, lat]
                        
                        // FIWARE usually gives [longitude, latitude], Leaflet needs [lat, lon]
                        const lat = coords[1];
                        const lon = coords[0];

                        const marker = L.circleMarker([lat, lon], {
                            radius: 5,
                            fillColor: "#ff7800",
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });

                        // Add a popup with the bus ID
                        marker.bindPopup(`Bus ID: ${bus.id}`);
                        busLayer.addLayer(marker);
                    }
                });
            } catch (error) {
                console.error("Error fetching bus data:", error);
            }
        }

        // Update every 30 seconds
        updateBuses();
        setInterval(updateBuses, 30000);
    </script>
</body>
</html>
