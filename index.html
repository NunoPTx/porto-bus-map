<!DOCTYPE html>
<html>
<head>
    <title>Porto Bus Network Static Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #111; }
        #map { height: 100vh; width: 100vw; background: #111; }
        #status {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: #00f3ff; padding: 10px;
            border-radius: 5px; font-family: monospace; border: 1px solid #00f3ff;
        }
    </style>
</head>
<body>
    <div id="status">Loading Network Shapes...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Use your existing lineDestinations object
        const lineDestinations = {
            "200": ["Bolhão", "Castelo do Queijo"], "201": ["Aliados", "Viso"], "202": ["Aliados", "Passeio Alegre"],
            "203": ["Estádio do Dragão", "Boavista (Casa da Música)"], "204": ["Hospital de São João", "Foz"],
            "205": ["Campanhã", "Castelo do Queijo"], "206": ["Campanhã", "Viso"], "207": ["Campanhã", "Foz (Mercado)"],
            "208": ["Aliados", "Aldoar"], "209": ["Pasteleira", "Prelada"], "300": ["Circular", "Circular"],
            "301": ["Circular", "Circular"], "302": ["Circular", "Circular"], "303": ["Circular", "Circular"],
            "304": ["Aliados", "Santa Luzia"], "305": ["Cordoaria", "Hospital de São João"], "400": ["Aliados", "Parque Nascente"],
            "401": ["Bolhão", "São Roque"], "402": ["Boavista (Bom Sucesso)", "São Roque"], "403": ["Boavista (Casa da Música)", "Campanhã"],
            "404": ["Campanhã (TIC)", "Hospital de São João"], "500": ["São Bento", "Matosinhos (Mercado)"],
            "501": ["Aliados", "Matosinhos (Praia)"], "502": ["Bolhão", "Matosinhos (Mercado)"], "503": ["Boavista (Bom Sucesso)", "Gatões"],
            "504": ["Boavista (Casa da Música)", "Norteshopping"], "505": ["Hospital de São João", "Matosinhos (Mercado)"],
            "506": ["Hospital de São João", "Matosinhos (Mercado)"], "507": ["Cordoaria", "MAR Shopping"],
            "508": ["Boavista (Casa da Música)", "Cabo do Mundo"], "600": ["Aliados", "Maia"], "601": ["Cordoaria", "Aeroporto"],
            "602": ["Cordoaria", "Aeroporto"], "603": ["Marquês", "Maia"], "604": ["Hospital de São João", "Aeroporto"],
            "605": ["Marquês", "Maia"], "700": ["Bolhão", "Campo"], "701": ["Bolhão", "Codiceira"], "702": ["Bolhão", "Travagem"],
            "703": ["Cordoaria", "Ermesinde"], "704": ["Boavista (Casa da Música)", "Codiceira"], "705": ["Hospital de São João", "Valongo"],
            "706": ["Hospital de São João", "Ermesinde"], "707": ["Hospital de São João", "Ermesinde"], "800": ["Bolhão", "Gondomar"],
            "801": ["Cordoaria", "São Pedro da Cova"], "803": ["Boavista (Bom Sucesso)", "Rio Tinto"],
            "804": ["Hospital de São João", "São Pedro da Cova"], "805": ["Marquês", "Rio Tinto"], "806": ["Marquês", "Fânzeres"],
            "900": ["Cordoaria", "Francelos"], "901": ["Trindade", "Valadares"], "902": ["Boavista (Casa da Música)", "Lavadores"],
            "903": ["Boavista (Casa da Música)", "Laborim"], "904": ["Trindade", "Coimbrões"], "905": ["Trindade", "Madalena"],
            "906": ["Trindade", "Madalena"], "907": ["Boavista (Bom Sucesso)", "Vila D'Este"], "107": ["Estádio do Dragão", "Areias"]
        };

        const map = L.map('map', { zoomControl: false }).setView([41.1579, -8.6291], 13);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri',
            maxZoom: 16
        }).addTo(map);

        function getBusColor(line) {
            const s = line.toString().toUpperCase().trim();
            if (s.endsWith('M')) return '#000000'; 
            if (s.startsWith('1') || s.startsWith('2') || s.startsWith('3') || s.startsWith('4') || s.includes('ZC')) return '#187ec2';
            if (s.startsWith('5')) return '#fcd116'; 
            if (s.startsWith('6')) return '#00ac00'; 
            if (s.startsWith('7')) return '#ff0000'; 
            if (s.startsWith('8')) return '#a347ff'; 
            if (s.startsWith('9')) return '#ff7900'; 
            return '#ffffff'; 
        }

        async function drawFullNetwork() {
            try {
                const response = await fetch('shapes.txt');
                const text = await response.text();
                const rows = text.split('\n');
                
                // Group coordinates by Shape ID
                const shapes = {};
                for (let i = 1; i < rows.length; i++) {
                    const col = rows[i].split(',');
                    if (col.length < 5) continue;
                    const shapeId = col[3];
                    if (!shapes[shapeId]) shapes[shapeId] = [];
                    shapes[shapeId].push({
                        lat: parseFloat(col[0]),
                        lng: parseFloat(col[1]),
                        seq: parseInt(col[4])
                    });
                }

                // Iterate through lines defined in your list
                Object.keys(lineDestinations).forEach(line => {
                    const color = getBusColor(line);
                    
                    // Draw Direction 1 (Full Opacity)
                    drawDirection(shapes, `${line}_0_1`, color, 1.0, 3);
                    
                    // Draw Direction 2 (60% Opacity)
                    drawDirection(shapes, `${line}_0_2`, color, 0.4, 2);
                    
                    // Handle Circulars (usually 0_3)
                    if (["300", "301", "302", "303"].includes(line)) {
                        drawDirection(shapes, `${line}_0_3`, color, 1.0, 3);
                    }
                });

                document.getElementById('status').style.display = 'none';
            } catch (e) {
                document.getElementById('status').innerText = "Error loading shapes.txt";
                console.error(e);
            }
        }

        function drawDirection(shapes, targetPrefix, color, opacity, weight) {
            // Find the first variant that matches the prefix
            const shapeId = Object.keys(shapes).find(id => id.startsWith(targetPrefix));
            if (shapeId) {
                const coords = shapes[shapeId]
                    .sort((a, b) => a.seq - b.seq)
                    .map(c => [c.lat, c.lng]);
                
                L.polyline(coords, {
                    color: color,
                    weight: weight,
                    opacity: opacity,
                    lineJoin: 'round',
                    interactive: false
                }).addTo(map);
            }
        }

        drawFullNetwork();
    </script>
</body>
</html>
